<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Half Marathon Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #ff6b6b;
      --primary-dark: #e85555;
      --coach-color: #a78bfa;
      --coach-dark: #7c3aed;
      --runner-color: #34d399;
      --runner-dark: #059669;
      --bg: #fff8f5;
      --card: #ffffff;
      --text: #2d2438;
      --text-muted: #9ca3af;
      --border: #f0e8ff;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 4px 20px rgba(167,139,250,0.12);
      --shadow-hover: 0 8px 32px rgba(167,139,250,0.22);
    }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NAV ─────────────────────────────────────────────── */
    nav {
      background: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(167,139,250,0.1);
    }
    nav .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      font-size: 1.15rem;
      color: var(--text);
    }
    nav .logo .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    nav .mode-badge {
      font-size: 0.75rem;
      font-weight: 800;
      padding: 6px 16px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    nav .mode-badge.coach { background: #ede9fe; color: var(--coach-dark); }
    nav .mode-badge.runner { background: #d1fae5; color: var(--runner-dark); }
    nav .switch-btn {
      background: var(--bg);
      color: var(--text-muted);
      border: 2px solid #f0e8ff;
      border-radius: 12px;
      padding: 7px 16px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: inherit;
      transition: all 0.2s;
    }
    nav .switch-btn:hover { border-color: var(--coach-color); color: var(--text); }

    /* ─── LANDING ─────────────────────────────────────────── */
    #landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, #667eea 0%, #f093fb 50%, #ff6b6b 100%);
      position: relative;
      overflow: hidden;
    }
    #landing::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      top: -150px; right: -150px;
    }
    #landing::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      bottom: -80px; left: -80px;
    }
    #landing .hero-badge {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.3);
    }
    #landing .hero-icon { font-size: 5rem; margin-bottom: 12px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)); }
    #landing h1 {
      color: white;
      font-size: 2.6rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: -1px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    #landing > p {
      color: rgba(255,255,255,0.8);
      margin-bottom: 48px;
      font-size: 1.05rem;
      font-weight: 600;
    }
    .role-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 580px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .role-card {
      flex: 1;
      min-width: 220px;
      background: white;
      border-radius: 24px;
      padding: 36px 28px 28px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .role-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 48px rgba(0,0,0,0.18); }
    .role-card .icon-wrap {
      width: 72px; height: 72px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 16px;
    }
    .coach-card .icon-wrap { background: linear-gradient(135deg, #ede9fe, #ddd6fe); }
    .runner-card .icon-wrap { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
    .role-card h2 { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; color: var(--text); }
    .role-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; font-weight: 600; }
    .role-btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 0.9rem;
      color: white;
      transition: opacity 0.2s;
    }
    .role-btn:hover { opacity: 0.9; }
    .coach-card .role-btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
    .runner-card .role-btn { background: linear-gradient(135deg, #34d399, #059669); }

    /* ─── APP SHELL ───────────────────────────────────────── */
    #app { display: none; }
    .container { max-width: 780px; margin: 0 auto; padding: 28px 16px; }

    /* ─── CARDS ───────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(167,139,250,0.08);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .card-header .icon-circle {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .card-header.coach-header .icon-circle { background: #ede9fe; }
    .card-header.runner-header .icon-circle { background: #d1fae5; }
    .card-header.neutral .icon-circle { background: #fff3e0; }
    .card-header h2 { font-size: 1.1rem; font-weight: 800; }

    /* ─── FORM ────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full-width { grid-column: 1 / -1; }
    label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
    input, select, textarea {
      border: 2px solid #f0e8ff;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.95rem;
      font-family: 'Nunito', inherit;
      font-weight: 600;
      color: var(--text);
      background: #fdfaff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--coach-color);
      box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
      background: white;
    }
    textarea { resize: vertical; min-height: 90px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 800;
      font-family: 'Nunito', inherit;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .btn:active { transform: scale(0.97); }
    .btn-coach { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: white; }
    .btn-runner { background: linear-gradient(135deg, #34d399, #059669); color: white; }
    .btn-danger { background: #fee2e2; color: #dc2626; padding: 7px 14px; font-size: 0.8rem; border-radius: 10px; }
    .btn-danger:hover { background: #fecaca; box-shadow: none; }
    .btn-sm { padding: 7px 16px; font-size: 0.82rem; }
    .btn-block { width: 100%; justify-content: center; }

    /* ─── TODAY'S WORKOUT ─────────────────────────────────── */
    .today-workout {
      background: linear-gradient(135deg, #fff8f5, #fdf4ff);
      border-radius: 16px;
      padding: 20px;
      border-left: 5px solid var(--primary);
    }
    .today-workout .workout-type {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .today-workout h3 { font-size: 1.4rem; font-weight: 900; margin-bottom: 12px; }
    .today-workout .meta {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .today-workout .meta span {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 700;
      background: white;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid #f0e8ff;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .today-workout .notes {
      background: white;
      border-radius: 12px;
      padding: 14px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      font-weight: 600;
      border: 1.5px solid #f0e8ff;
    }

    /* ─── WORKOUT LIST ────────────────────────────────────── */
    .workout-list { display: flex; flex-direction: column; gap: 10px; }
    .workout-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      background: #fdfaff;
      border-radius: 16px;
      border: 1.5px solid #f0e8ff;
      transition: all 0.2s;
    }
    .workout-item:hover { background: #f5f0ff; border-color: #ddd6fe; transform: translateX(3px); }
    .workout-date-box {
      min-width: 52px;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 14px;
      padding: 8px 4px;
    }
    .workout-date-box .day-num { font-size: 1.4rem; font-weight: 900; line-height: 1; }
    .workout-date-box .day-mon { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; font-weight: 700; }
    .workout-info { flex: 1; min-width: 0; }
    .workout-info .type-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 5px;
    }
    .workout-info h4 { font-size: 0.95rem; font-weight: 800; margin-bottom: 2px; }
    .workout-info .desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
    .workout-info .meta-sm { display: flex; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
    .workout-info .meta-sm span { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; background: white; padding: 2px 8px; border-radius: 20px; border: 1px solid #f0e8ff; }
    .workout-actions { display: flex; gap: 6px; align-items: flex-start; padding-top: 2px; }

    /* ─── TYPE COLORS ─────────────────────────────────────── */
    .type-easy { background: #d1fae5; color: #065f46; }
    .type-tempo { background: #fee2e2; color: #991b1b; }
    .type-long { background: #dbeafe; color: #1e40af; }
    .type-intervals { background: #fef3c7; color: #92400e; }
    .type-rest { background: #f3f4f6; color: #6b7280; }
    .type-cross { background: #ede9fe; color: #5b21b6; }
    .type-race { background: #fce7f3; color: #9d174d; }

    /* ─── EMPTY STATE ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 44px 20px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 14px; }
    .empty-state h3 { font-size: 1rem; font-weight: 800; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 0.85rem; font-weight: 600; }

    /* ─── REST DAY ────────────────────────────────────────── */
    .rest-day-card {
      text-align: center;
      padding: 36px;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-radius: var(--radius);
      border: 2px dashed #86efac;
    }
    .rest-day-card .icon { font-size: 3.5rem; margin-bottom: 10px; }
    .rest-day-card h3 { font-size: 1.3rem; font-weight: 900; color: #15803d; }
    .rest-day-card p { color: #166534; font-size: 0.9rem; margin-top: 6px; font-weight: 600; }

    /* ─── STATS ───────────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-box {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 18px 12px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1.5px solid #f0e8ff;
      position: relative;
      overflow: hidden;
    }
    .stat-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .stat-box:nth-child(1)::before { background: linear-gradient(90deg, #a78bfa, #7c3aed); }
    .stat-box:nth-child(2)::before { background: linear-gradient(90deg, #ff6b6b, #ff8e53); }
    .stat-box:nth-child(3)::before { background: linear-gradient(90deg, #34d399, #059669); }
    .stat-box .val { font-size: 1.7rem; font-weight: 900; color: var(--text); }
    .stat-box .lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-top: 2px; font-weight: 800; }

    /* ─── TOAST ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #2d2438, #3d3050);
      color: white;
      padding: 13px 28px;
      border-radius: 16px;
      font-size: 0.9rem;
      font-weight: 700;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── SECTION TITLE ───────────────────────────────────── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ─── TABS (runner) ───────────────────────────────────── */
    .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: white; padding: 5px; border-radius: 16px; box-shadow: var(--shadow); border: 1.5px solid #f0e8ff; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 0.88rem; font-weight: 800; color: var(--text-muted); transition: all 0.2s; border: none; background: transparent; font-family: 'Nunito', inherit; }
    .tab.active { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: var(--runner-dark); box-shadow: 0 2px 8px rgba(52,211,153,0.2); }

    /* ─── WEEK VIEW ────────────────────────────────────────── */
    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .week-nav-title { font-weight: 900; font-size: 0.95rem; color: var(--text); }
    .week-nav-btn {
      background: white; border: 1.5px solid #f0e8ff; border-radius: 12px;
      padding: 8px 16px; cursor: pointer; font-weight: 800; font-family: 'Nunito', inherit;
      font-size: 0.82rem; color: var(--text-muted); transition: all 0.2s;
    }
    .week-nav-btn:hover { border-color: var(--runner-color); color: var(--runner-dark); }

    .week-list { display: flex; flex-direction: column; gap: 10px; }

    .week-day {
      background: white; border-radius: 18px; border: 1.5px solid #f0e8ff;
      overflow: hidden; transition: border-color 0.2s;
    }
    .week-day.is-today { border-color: var(--runner-color); box-shadow: 0 0 0 3px rgba(52,211,153,0.12); }

    .week-day-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    }
    .week-day-label {
      display: flex; flex-direction: column; align-items: center;
      min-width: 44px; flex-shrink: 0;
    }
    .week-day-label .d-name {
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted);
    }
    .week-day-label .d-num {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 900; color: var(--text);
      margin-top: 2px;
    }
    .week-day.is-today .d-num { background: var(--runner-color); color: white; }

    .week-day-content { flex: 1; min-width: 0; }
    .week-rest-label {
      font-size: 0.82rem; font-weight: 700; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }

    .week-workout-pill {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; background: #fdfaff; border-radius: 12px;
      padding: 10px 12px; border: 1.5px solid #f0e8ff;
      margin-bottom: 6px;
    }
    .week-workout-pill:last-of-type { margin-bottom: 0; }
    .week-pill-left { display: flex; flex-direction: column; min-width: 0; }
    .week-pill-badge {
      font-size: 0.62rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 2px 7px; border-radius: 6px;
      margin-bottom: 3px; display: inline-block; align-self: flex-start;
    }
    .week-pill-title { font-size: 0.85rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .week-pill-meta { font-size: 0.73rem; color: var(--text-muted); font-weight: 700; margin-top: 2px; }
    .week-move-btn {
      background: #ede9fe; border: none; border-radius: 8px;
      padding: 5px 10px; cursor: pointer; font-size: 0.72rem;
      font-weight: 800; color: var(--coach-dark); font-family: 'Nunito', inherit;
      white-space: nowrap; transition: background 0.2s; flex-shrink: 0;
    }
    .week-move-btn:hover { background: #ddd6fe; }

    .move-picker {
      padding: 10px 16px 14px; border-top: 1.5px solid #f0e8ff;
      background: #fdfaff;
    }
    .move-picker-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }
    .move-picker-days { display: flex; flex-wrap: wrap; gap: 6px; }
    .move-day-btn {
      border: 1.5px solid #f0e8ff; background: white; border-radius: 10px;
      padding: 6px 12px; cursor: pointer; font-size: 0.78rem; font-weight: 800;
      color: var(--text-muted); font-family: 'Nunito', inherit; transition: all 0.15s;
    }
    .move-day-btn:hover { border-color: var(--runner-color); color: var(--runner-dark); background: #f0fdf4; }
    .move-day-btn.is-current { background: #d1fae5; border-color: var(--runner-color); color: var(--runner-dark); }
    .move-cancel-btn {
      border: 1.5px solid #fee2e2; background: white; border-radius: 10px;
      padding: 6px 12px; cursor: pointer; font-size: 0.78rem; font-weight: 800;
      color: #dc2626; font-family: 'Nunito', inherit; transition: all 0.15s;
    }
    .move-cancel-btn:hover { background: #fee2e2; }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .role-cards { flex-direction: column; }
    }
  </style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LANDING
═══════════════════════════════════════════════════════════ -->
<div id="landing">
  <div class="hero-badge">🏅 Half Marathon Training</div>
  <div class="hero-icon">🏃‍♀️</div>
  <h1>Train. Run. Conquer.</h1>
  <p>Your coach & runner, in perfect sync ✨</p>
  <div class="role-cards">
    <div class="role-card coach-card" onclick="enterView('coach')">
      <div class="icon-wrap">📋</div>
      <h2>Coach</h2>
      <p>Plan workouts and keep your runner on track</p>
      <div class="role-btn">Coach View →</div>
    </div>
    <div class="role-card runner-card" onclick="enterView('runner')">
      <div class="icon-wrap">👟</div>
      <h2>Runner</h2>
      <p>See today's workout and your full schedule</p>
      <div class="role-btn">Runner View →</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════════ -->
<div id="app">
  <nav>
    <div class="logo">
      <div class="logo-icon">🏃</div>
      Half Marathon Trainer
    </div>
    <span class="mode-badge" id="modeBadge"></span>
    <button class="switch-btn" onclick="backToLanding()">Switch Role</button>
  </nav>

  <div class="container" id="viewContainer"></div>
</div>

<div id="toast"></div>

<script>
// ─── FIREBASE SETUP ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBcFlhIPJIrPTEYP-Ax93JDNrJfQAyLpSw",
  authDomain: "grimleyhalfmarathon.firebaseapp.com",
  databaseURL: "https://grimleyhalfmarathon-default-rtdb.firebaseio.com",
  projectId: "grimleyhalfmarathon",
  storageBucket: "grimleyhalfmarathon.firebasestorage.app",
  messagingSenderId: "73013727718",
  appId: "1:73013727718:web:b63a4a7369185e18514627"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const workoutsRef = db.ref('workouts');

// ─── STATE ──────────────────────────────────────────────────
let currentView = null;
let activeTab = 'today';
let workouts = [];
let weekOffset = 0;
let movingWorkoutId = null;

// Real-time listener — re-renders whenever Firebase data changes
workoutsRef.on('value', snapshot => {
  const data = snapshot.val();
  workouts = data
    ? Object.entries(data).map(([id, w]) => ({ id, ...w }))
    : [];
  if (currentView) renderView(activeTab);
});

// ─── NAVIGATION ─────────────────────────────────────────────
function enterView(view) {
  currentView = view;
  activeTab = 'today';
  document.getElementById('landing').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';

  const badge = document.getElementById('modeBadge');
  badge.textContent = view === 'coach' ? '📋 Coach' : '👟 Runner';
  badge.className = 'mode-badge ' + view;

  renderView();
}

function backToLanding() {
  document.getElementById('landing').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  currentView = null;
}

// ─── COACH VIEW ─────────────────────────────────────────────
function renderCoach() {
  const upcoming = workouts.filter(w => w.date >= today()).sort((a,b)=>a.date.localeCompare(b.date));
  const past = workouts.filter(w => w.date < today()).sort((a,b)=>b.date.localeCompare(a.date));

  const totalMiles = workouts.reduce((s,w) => s + (parseFloat(w.distance)||0), 0);

  return `
    <div class="stats-row">
      <div class="stat-box"><div class="val">${workouts.length}</div><div class="lbl">Workouts</div></div>
      <div class="stat-box"><div class="val">${upcoming.length}</div><div class="lbl">Upcoming</div></div>
      <div class="stat-box"><div class="val">${totalMiles.toFixed(1)}</div><div class="lbl">Total Miles</div></div>
    </div>

    <div class="card">
      <div class="card-header coach-header"><div class="icon-circle">➕</div><h2>Add Workout</h2></div>
      <form onsubmit="addWorkout(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="wDate" value="${today()}" required />
          </div>
          <div class="form-group">
            <label>Workout Type</label>
            <select id="wType" required>
              <option value="">Select type…</option>
              <option value="easy">Easy Run</option>
              <option value="tempo">Tempo Run</option>
              <option value="long">Long Run</option>
              <option value="intervals">Intervals</option>
              <option value="cross">Cross Training</option>
              <option value="rest">Rest Day</option>
              <option value="race">Race / Time Trial</option>
            </select>
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="wTitle" placeholder="e.g. Easy 5-mile recovery" required />
          </div>
          <div class="form-group">
            <label>Distance (miles)</label>
            <input type="number" id="wDistance" placeholder="0" step="0.1" min="0" />
          </div>
          <div class="form-group">
            <label>Duration (minutes)</label>
            <input type="number" id="wDuration" placeholder="0" min="0" />
          </div>
          <div class="form-group">
            <label>Target Pace (min/mile)</label>
            <input type="text" id="wPace" placeholder="e.g. 9:30" />
          </div>
          <div class="form-group full-width">
            <label>Coach Notes</label>
            <textarea id="wNotes" placeholder="Describe the workout, effort level, key focus points…"></textarea>
          </div>
        </div>
        <div style="margin-top:16px">
          <button type="submit" class="btn btn-coach">Add Workout</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-header coach-header"><div class="icon-circle">📅</div><h2>Upcoming Workouts</h2></div>
      ${upcoming.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📭</div><h3>No upcoming workouts</h3><p>Use the form above to schedule your first workout.</p></div>`
        : `<div class="workout-list">${upcoming.map(workoutItemHTML).join('')}</div>`}
    </div>

    ${past.length > 0 ? `
    <div class="card">
      <div class="card-header neutral"><div class="icon-circle">🗓</div><h2>Past Workouts</h2></div>
      <div class="workout-list">${past.map(workoutItemHTML).join('')}</div>
    </div>` : ''}
  `;
}

// ─── RUNNER VIEW ─────────────────────────────────────────────
function renderRunner(tab = 'today') {
  const todayW = workouts.find(w => w.date === today());
  const upcoming = workouts.filter(w => w.date > today()).sort((a,b)=>a.date.localeCompare(b.date));

  const todayHTML = todayW
    ? todayW.type === 'rest'
        ? `<div class="rest-day-card"><div class="icon">😴</div><h3>Rest Day</h3><p>${esc(todayW.notes) || "Take it easy today — recovery is training too!"}</p></div>`
        : `<div class="today-workout">
            <div class="workout-type">${typeLabel(todayW.type)}</div>
            <h3>${esc(todayW.title)}</h3>
            <div class="meta">
              ${todayW.distance ? `<span>📏 ${todayW.distance} miles</span>` : ''}
              ${todayW.duration ? `<span>⏱ ${todayW.duration} min</span>` : ''}
              ${todayW.pace ? `<span>🏃 ${esc(todayW.pace)} /mi</span>` : ''}
            </div>
            ${todayW.notes ? `<div class="notes">${esc(todayW.notes)}</div>` : ''}
          </div>`
    : `<div class="empty-state"><div class="empty-icon">🌅</div><h3>No workout scheduled for today</h3><p>Check back later or ask your coach to add today's session.</p></div>`;

  const schedHTML = upcoming.length === 0
    ? `<div class="empty-state"><div class="empty-icon">📭</div><h3>No upcoming workouts</h3><p>Your coach hasn't scheduled any upcoming sessions yet.</p></div>`
    : `<div class="workout-list">${upcoming.map(w => workoutItemHTML(w, false)).join('')}</div>`;

  return `
    <div class="tabs">
      <button class="tab ${tab==='today'?'active':''}" onclick="switchTab('today')">Today</button>
      <button class="tab ${tab==='week'?'active':''}" onclick="switchTab('week')">My Week</button>
      <button class="tab ${tab==='schedule'?'active':''}" onclick="switchTab('schedule')">All</button>
    </div>

    <div id="tab-today" style="display:${tab==='today'?'block':'none'}">
      <p class="section-title">${formatDate(today())}</p>
      <div class="card" style="padding: 28px;">${todayHTML}</div>
    </div>

    <div id="tab-week" style="display:${tab==='week'?'block':'none'}">
      ${renderWeekView()}
    </div>

    <div id="tab-schedule" style="display:${tab==='schedule'?'block':'none'}">
      <p class="section-title">All Upcoming Workouts</p>
      <div class="card">${schedHTML}</div>
    </div>
  `;
}

// ─── WEEK VIEW ───────────────────────────────────────────────
function renderWeekView() {
  const weekStart = getWeekStart();
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d;
  });

  const weekLabel = `${days[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${days[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

  const daysHTML = days.map(d => {
    const dateStr = fmtDate(d);
    const isToday = dateStr === today();
    const dayWorkouts = workouts.filter(w => w.date === dateStr);
    const dName = d.toLocaleDateString('en-US', { weekday: 'short' });
    const dNum = d.getDate();

    const workoutsHTML = dayWorkouts.length === 0
      ? `<div class="week-rest-label">💤 Rest</div>`
      : dayWorkouts.map(w => {
          const isMoving = movingWorkoutId === w.id;
          const meta = [w.distance ? `${w.distance}mi` : '', w.duration ? `${w.duration}min` : '', w.pace ? `${esc(w.pace)}/mi` : ''].filter(Boolean).join(' · ');
          return `
            <div class="week-workout-pill">
              <div class="week-pill-left">
                <span class="week-pill-badge type-${w.type}">${typeLabel(w.type)}</span>
                <span class="week-pill-title">${esc(w.title)}</span>
                ${meta ? `<span class="week-pill-meta">${meta}</span>` : ''}
              </div>
              <button class="week-move-btn" onclick="startMove('${w.id}')">✏️ Move</button>
            </div>
            ${isMoving ? movePicker(w.id, w.date, days) : ''}
          `;
        }).join('');

    return `
      <div class="week-day ${isToday ? 'is-today' : ''}">
        <div class="week-day-row">
          <div class="week-day-label">
            <span class="d-name">${dName}</span>
            <span class="d-num">${dNum}</span>
          </div>
          <div class="week-day-content">${workoutsHTML}</div>
        </div>
        ${dayWorkouts.some(w => movingWorkoutId === w.id) ? '' : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">← Prev</button>
      <span class="week-nav-title">${weekLabel}</span>
      <button class="week-nav-btn" onclick="changeWeek(1)">Next →</button>
    </div>
    <div class="week-list">${daysHTML}</div>
    <p style="margin-top:14px; font-size:0.78rem; color:var(--text-muted); text-align:center; font-weight:600;">
      Tap ✏️ Move on any workout to reschedule it
    </p>
  `;
}

function movePicker(workoutId, currentDate, days) {
  const btns = days.map(d => {
    const dateStr = fmtDate(d);
    const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    return `<button class="move-day-btn ${currentDate === dateStr ? 'is-current' : ''}" onclick="confirmMove('${workoutId}','${dateStr}')">${label}</button>`;
  }).join('');
  return `
    <div class="move-picker">
      <div class="move-picker-label">Move to…</div>
      <div class="move-picker-days">
        ${btns}
        <button class="move-cancel-btn" onclick="cancelMove()">✕ Cancel</button>
      </div>
    </div>
  `;
}

function getWeekStart() {
  const d = new Date();
  const dow = d.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow; // shift to Monday
  d.setDate(d.getDate() + diff + weekOffset * 7);
  d.setHours(0, 0, 0, 0);
  return d;
}

function fmtDate(d) {
  // Format as YYYY-MM-DD in local time
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function changeWeek(delta) {
  weekOffset += delta;
  renderView(activeTab);
}

function startMove(id) {
  movingWorkoutId = id;
  renderView(activeTab);
}

function cancelMove() {
  movingWorkoutId = null;
  renderView(activeTab);
}

function confirmMove(id, newDate) {
  workoutsRef.child(id).update({ date: newDate })
    .then(() => {
      movingWorkoutId = null;
      showToast('Workout moved! 📅');
    })
    .catch(() => showToast('Error moving workout'));
}

// ─── SHARED HELPERS ──────────────────────────────────────────
function workoutItemHTML(w, showDelete = true) {
  const d = new Date(w.date + 'T00:00:00');
  const dayNum = d.getDate();
  const mon = d.toLocaleString('en-US', { month: 'short' });
  return `
    <div class="workout-item" id="item-${w.id}">
      <div class="workout-date-box">
        <div class="day-num">${dayNum}</div>
        <div class="day-mon">${mon}</div>
      </div>
      <div class="workout-info">
        <span class="type-badge type-${w.type}">${typeLabel(w.type)}</span>
        <h4>${esc(w.title)}</h4>
        ${w.notes ? `<div class="desc">${esc(w.notes)}</div>` : ''}
        <div class="meta-sm">
          ${w.distance ? `<span>📏 ${w.distance}mi</span>` : ''}
          ${w.duration ? `<span>⏱ ${w.duration}min</span>` : ''}
          ${w.pace ? `<span>🏃 ${esc(w.pace)}/mi</span>` : ''}
        </div>
      </div>
      ${showDelete ? `<div class="workout-actions"><button class="btn btn-danger btn-sm" onclick="deleteWorkout('${w.id}')">✕</button></div>` : ''}
    </div>
  `;
}

function addWorkout(e) {
  e.preventDefault();
  const date = document.getElementById('wDate').value;
  const type = document.getElementById('wType').value;
  const title = document.getElementById('wTitle').value.trim();
  const distance = document.getElementById('wDistance').value;
  const duration = document.getElementById('wDuration').value;
  const pace = document.getElementById('wPace').value.trim();
  const notes = document.getElementById('wNotes').value.trim();

  if (!date || !type || !title) return;

  workoutsRef.push({ date, type, title, distance, duration, pace, notes })
    .then(() => showToast('Workout added! ✅'))
    .catch(() => showToast('Error saving workout'));
}

function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  workoutsRef.child(id).remove()
    .then(() => showToast('Workout deleted'))
    .catch(() => showToast('Error deleting workout'));
}

function switchTab(tab) {
  activeTab = tab;
  movingWorkoutId = null;
  if (tab !== 'week') weekOffset = 0;
  renderView(tab);
}

function renderView(tab = 'today') {
  const container = document.getElementById('viewContainer');
  if (currentView === 'coach') {
    container.innerHTML = renderCoach();
  } else {
    container.innerHTML = renderRunner(tab);
  }
}

// ─── UTILS ───────────────────────────────────────────────────
function today() {
  return new Date().toISOString().split('T')[0];
}
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function typeLabel(t) {
  return { easy:'Easy Run', tempo:'Tempo Run', long:'Long Run', intervals:'Intervals', cross:'Cross Training', rest:'Rest Day', race:'Race' }[t] || t;
}
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
